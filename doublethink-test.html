<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Doublethink — Fan Test</title>
  <style>
    @font-face {
      font-family: 'Terminal Grotesque';
      src: url('fonts/terminal-grotesque-webfont.woff2') format('woff2'),
           url('fonts/terminal-grotesque-webfont.woff')  format('woff'),
           url('fonts/terminal-grotesque-webfont.ttf')   format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #312e2e;
      height: 300vh; /* 200vh of scroll range drives the full fan */
    }

    /* Fixed stage — always fills the viewport regardless of scroll */
    .scene {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* All lines sit at the same absolute position — stacked on top of each other */
    .line {
      position: absolute;
      color: #e9e9e9;
      font-family: 'Terminal Grotesque', sans-serif;
      font-size: clamp(28px, 6vw, 90px);
      font-weight: 400;
      line-height: 1;
      white-space: nowrap;
      user-select: none;
      will-change: transform;
    }
  </style>
</head>
<body>

  <div class="scene">
    <span class="line">Doublethink</span>
    <span class="line">Doublethink</span>
    <span class="line">Doublethink</span>
    <span class="line">Doublethink</span>
    <span class="line">Doublethink</span>
    <span class="line">Doublethink</span>
    <span class="line">Doublethink</span>
    <span class="line">Doublethink</span>
    <span class="line">Doublethink</span>
  </div>

  <script>
    /* ── Tuning knobs ──────────────────────────────────────────────────────── */
    var SCALE_Y = 2.5;  /* vertical stretch — increase for taller/more condensed */
    /* MAX_SPREAD is derived at runtime from the rendered font size so it works
       across all viewport widths. It equals one visual line-height + 10% gap,
       so adjacent lines never overlap at the end state.                        */

    /* ── Setup ────────────────────────────────────────────────────────────── */
    var lines   = [].slice.call(document.querySelectorAll('.line'));
    var COUNT   = lines.length;       /* 9                                      */
    var CENTER  = Math.floor(COUNT / 2); /* 4 — the index of the middle line   */

    /* Measure the natural CSS height of one line (pre-transform).
       Visual height = cssHeight × SCALE_Y. Use that as the spacing step.      */
    var MAX_SPREAD = Math.round(lines[0].offsetHeight * SCALE_Y * 1.1);

    /* ── Animation loop ───────────────────────────────────────────────────── */
    function update() {
      var scrollable = document.documentElement.scrollHeight - window.innerHeight;
      var progress   = scrollable > 0
        ? Math.min(1, Math.max(0, window.scrollY / scrollable))
        : 0;

      lines.forEach(function (line, i) {
        /* offset is in viewport pixels (translateY applied AFTER scaleY in
           transform order, so it's not multiplied by SCALE_Y)                 */
        var offset = (i - CENTER) * MAX_SPREAD * progress;
        line.style.transform =
          'translateY(' + offset.toFixed(1) + 'px) scaleY(' + SCALE_Y + ')';
      });

      requestAnimationFrame(update);
    }

    update();
  </script>

</body>
</html>
