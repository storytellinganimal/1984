<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>George Orwell — Convergence Test</title>
  <style>
    @font-face {
      font-family: 'Terminal Grotesque';
      src: url('fonts/terminal-grotesque-webfont.woff2') format('woff2'),
           url('fonts/terminal-grotesque-webfont.woff')  format('woff'),
           url('fonts/terminal-grotesque-webfont.ttf')   format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #312e2e;
      height: 300vh; /* 200vh of scroll range drives the full convergence */
    }

    /* Fixed stage — always fills the viewport regardless of scroll */
    .scene {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* All lines share the same absolute centre — they start there
       and the JS scatter pushes them out from load. At progress=1
       every line returns here, perfectly stacked. */
    .line {
      position: absolute;
      color: #e9e9e9;
      font-family: 'Terminal Grotesque', sans-serif;
      font-size: clamp(24px, 7vw, 106px);
      font-weight: 400;
      line-height: 1;
      white-space: nowrap;
      user-select: none;
      will-change: transform;
    }
  </style>
</head>
<body>

  <div class="scene">
    <span class="line">George Orwell</span>
    <span class="line">George Orwell</span>
    <span class="line">George Orwell</span>
    <span class="line">George Orwell</span>
    <span class="line">George Orwell</span>
  </div>

  <script>
    var SCALE_Y    = 2.5;   /* vertical stretch                              */
    var COUNT      = 5;
    var CENTER     = 2;     /* index of middle line (0-based)                */
    var lines = [].slice.call(document.querySelectorAll('.line'));

    /* Pitch: one visual line-height + 10% breathing room */
    var MAX_SPREAD = Math.round(lines[0].offsetHeight * SCALE_Y * 1.1);

    /* ── Animation loop ───────────────────────────────────────────────── */
    function update() {
      var scrollable = document.documentElement.scrollHeight - window.innerHeight;
      var progress   = scrollable > 0
        ? Math.min(1, Math.max(0, window.scrollY / scrollable))
        : 0;

      /* inv: 1 = fully spread (top of page), 0 = fully stacked (bottom) */
      var inv = 1 - progress;

      lines.forEach(function (line, i) {
        var offset = (i - CENTER) * MAX_SPREAD * inv;
        line.style.transform =
          'translateY(' + offset.toFixed(1) + 'px) scaleY(' + SCALE_Y + ')';
      });

      requestAnimationFrame(update);
    }

    update();
  </script>

</body>
</html>
